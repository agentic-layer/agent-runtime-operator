apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: Agent
metadata:
  labels:
    app.kubernetes.io/name: agent-runtime-operator
    app.kubernetes.io/managed-by: kustomize
  name: custom-agent-no-probe
spec:
  framework: custom
  image: ghcr.io/example/custom-agent:latest
  # No protocols defined - will result in no readiness probe
  replicas: 1
  env:
    - name: CUSTOM_CONFIG
      value: "enabled"