apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: Agent
metadata:
  labels:
    app.kubernetes.io/name: agent-runtime-operator
    app.kubernetes.io/managed-by: kustomize
  name: mixed-protocol-agent
spec:
  framework: google-adk
  image: ghcr.io/example/mixed-agent:latest
  protocols:
    - type: A2A       # Priority: A2A probe will be used (HTTP GET /a2a/.well-known/agent-card.json)
      port: 8000
    - type: OpenAI    # Secondary protocol - TCP probe would be used if A2A wasn't present
      port: 3000
  replicas: 1
  env:
    - name: A2A_PORT
      value: "8000"
    - name: OPENAI_PORT
      value: "3000"