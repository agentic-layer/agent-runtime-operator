---
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: Guard
metadata:
  name: pii-guard
  namespace: default
spec:
  mode: [pre_call]
  description: Detects and handles Personally Identifiable Information (PII) in user inputs.
  providerRef:
    kind: GuardrailProvider
    name: openai-moderation
    namespace: default
  openaiModeration:
    model: omni-moderation-latest
---
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: Guard
metadata:
  name: toxic-language-guard
  namespace: default
spec:
  mode: [pre_call]
  description: Detects and blocks toxic or harmful language in user inputs.
  providerRef:
    kind: GuardrailProvider
    name: openai-moderation
    namespace: default
---
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: Guard
metadata:
  name: bedrock-content-guard
  namespace: default
spec:
  mode: [pre_call]
  description: Content filtering using AWS Bedrock Guardrails.
  providerRef:
    kind: GuardrailProvider
    name: bedrock-guardrails
    namespace: default
  bedrock:
    guardrailId: "abc123"
    guardrailVersion: "1"
---
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: Guard
metadata:
  name: presidio-pii-guard
  namespace: default
spec:
  mode: [pre_call]
  description: Detects PII using Presidio analyzer.
  providerRef:
    kind: GuardrailProvider
    name: presidio-analyzer
    namespace: default
  presidio:
    entities:
      - PHONE_NUMBER
      - EMAIL_ADDRESS
      - CREDIT_CARD
    language: en
    scoreThreshold: "0.7"
