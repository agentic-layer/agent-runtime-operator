---
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: GuardrailProvider
metadata:
  name: openai-moderation
  namespace: default
spec:
  protocol: openai-moderation
---
apiVersion: runtime.agentic-layer.ai/v1alpha1
