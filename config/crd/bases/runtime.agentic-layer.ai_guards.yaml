---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: guards.runtime.agentic-layer.ai
spec:
  group: runtime.agentic-layer.ai
  names:
    kind: Guard
    listKind: GuardList
    plural: guards
    singular: guard
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Guard is the Schema for the guards API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: GuardSpec defines the desired state of Guard.
            properties:
              bedrock:
                description: Bedrock holds guard-level configuration for the AWS Bedrock
                  Guardrails API.
                properties:
                  guardrailId:
                    description: GuardrailId is the identifier of the Bedrock guardrail.
                    type: string
                  guardrailVersion:
                    description: GuardrailVersion is the version of the Bedrock guardrail.
                    type: string
                required:
                - guardrailId
                type: object
              description:
                description: |-
                  Description provides a human-readable description of the guard's purpose.
                  This field is for documentation purposes only and has no effect on the guard's behavior.
                type: string
              mode:
                description: |-
                  Mode defines when the guard is applied relative to the LLM call.
                  Multiple modes can be specified to apply the guard at multiple points.
                items:
                  description: GuardMode defines when a guard is applied relative
                    to the LLM call.
                  enum:
                  - pre_call
                  - post_call
                  - during_call
                  type: string
                minItems: 1
                type: array
                x-kubernetes-list-type: set
              openaiModeration:
                description: OpenAIModeration holds guard-level configuration for
                  the OpenAI Moderation API.
                properties:
                  model:
                    description: |-
                      Model specifies the moderation model to use (e.g., "omni-moderation-latest").
                      When omitted, the provider's default model is used.
                    type: string
                type: object
              presidio:
                description: Presidio holds guard-level configuration for the Presidio
                  API.
                properties:
                  entityActions:
                    additionalProperties:
                      type: string
                    description: |-
                      EntityActions maps PII entity types to actions to take when detected.
                      Supported actions are "MASK" (redact the entity) and "BLOCK" (reject the request).
                      When omitted, detected entities are blocked by default.
                      The keys also determine which entity types are detected.
                      When omitted entirely, all supported entities are detected.
                      Example: {"EMAIL_ADDRESS": "MASK", "CREDIT_CARD": "BLOCK", "PHONE_NUMBER": "MASK"}
                    type: object
                  language:
                    description: |-
                      Language specifies the language of the text to analyze (e.g., "en").
                      Defaults to "en" when omitted.
                    type: string
                  scoreThresholds:
                    additionalProperties:
                      type: string
                    description: |-
                      ScoreThresholds maps entity types to minimum confidence scores (0.0 to 1.0).
                      Use "ALL" as key to set a default threshold for all entity types.
                      Per-entity thresholds override the "ALL" key.
                      Example: {"ALL": "0.5", "EMAIL_ADDRESS": "0.8", "PHONE_NUMBER": "0.6"}
                    type: object
                type: object
              providerRef:
                description: |-
                  ProviderRef references the GuardrailProvider that hosts this guard.
                  If Namespace is not specified, defaults to the same namespace as the Guard.
                properties:
                  apiVersion:
                    description: API version of the referent.
                    type: string
                  fieldPath:
                    description: |-
                      If referring to a piece of an object instead of an entire object, this string
                      should contain a valid JSON/Go field access statement, such as desiredState.manifest.containers[2].
                      For example, if the object reference is to a container within a pod, this would take on a value like:
                      "spec.containers{name}" (where "name" refers to the name of the container that triggered
                      the event) or if no container name is specified "spec.containers[2]" (container with
                      index 2 in this pod). This syntax is chosen only to have some well-defined way of
                      referencing a part of an object.
                    type: string
                  kind:
                    description: |-
                      Kind of the referent.
                      More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                    type: string
                  name:
                    description: |-
                      Name of the referent.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                  namespace:
                    description: |-
                      Namespace of the referent.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/
                    type: string
                  resourceVersion:
                    description: |-
                      Specific resourceVersion to which this reference is made, if any.
                      More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
                    type: string
                  uid:
                    description: |-
                      UID of the referent.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#uids
                    type: string
                type: object
                x-kubernetes-map-type: atomic
            required:
            - mode
            - providerRef
            type: object
          status:
            description: GuardStatus defines the observed state of Guard.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
